services:
  watcharr:
    image: ghcr.io/gipasoft/watcharr:latest
    container_name: watcharr
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    networks:
      - qnap-network      
    restart: unless-stopped
    labels:
      - diun.enable=true
networks:
  qnap-network:
    external: true
